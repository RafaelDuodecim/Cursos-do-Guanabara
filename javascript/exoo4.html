<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English, please</title>

     <style>
        body{
        font: normal 20pt Arial
        }
     </style>

</head>
<body>
    <script>
    var nome = window.prompt('What is your name?')
    document.write(`Hello, <strong>${nome}!</strong> Your name has ${nome.length} letters.<br/>`)
    document.write(`Your name in lowercase is <strong>${nome.toLowerCase()}.RRa</strong><br/>`)
    document.write(`Your name in toUppercase is <strong>${nome.toUpperCase()}.</strong>`)
</script>
    
</body>
</html>
