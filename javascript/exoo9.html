<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    Velocidade do carro: <input type="number" name="txtvel" id="txtvel"> km/h
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res">

    </div>
    <script>
        function calcular(){
            var txtv = window.document.querySelector('input#txtvel')
            var res = window.document.querySelector('div#res')
            var velo = Number(txtv.value)
            res.innerHTML = `Sua velocidade atual é de ${velo} km/h, favor ter atenção.`
            if (velo > 60) {
            res.innerHTML+= `<p>Você foi <strong>multado</strong> por excesso de velocidade.</p>`
            } else {
                    res.innerHTML += `<p>Você é um excelente motorista!</p>`
                 }
            res.innerHTML += `<p> Dirija sempre com cinto de segurança! </p>`
        }
    </script>
</body>
</html>
