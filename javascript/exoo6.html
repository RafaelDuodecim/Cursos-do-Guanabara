<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Dom</title>
    <style>
        div#area{
            font: normal 20pt Times;
            background: green;
            color: antiquewhite;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()">
        Interajaaaa...          
    </div>
    <script>
        function clicar(){
            var a = window.document.getElementById('area')
            a.innerText = 'clicou!'
            a.style.background = 'Red'
        }
        function entrar(){
            var a = window.document.getElementById('area')
          a.innerText = 'Entrou!'    
          a.style.background = 'Green'
        }
        function sair(){
            var a = window.document.getElementById('area')
          a.innerText = 'Sair!'
          a.style.background = 'Blue'   
        }

    </script>
    
</body>
</html>
